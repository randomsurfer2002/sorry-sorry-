<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Favorite Doctor 🩺❤️</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fff1f2 0%, #fce7f3 50%, #ffe4e6 100%);
            -webkit-touch-callout: none;
            user-select: none;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        @keyframes dynamic-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .pulse-btn {
            animation: dynamic-bounce 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 overflow-y-auto relative bg-fixed">

    <!-- Ambient Background Elements -->
    <div class="absolute top-6 left-6 text-2xl opacity-40">🩺</div>
    <div class="absolute bottom-12 right-6 text-3xl opacity-40">❤️</div>
    <div class="absolute top-1/4 right-8 text-2xl opacity-30">💊</div>

    <!-- Main Dynamic Card -->
    <div class="bg-white/90 backdrop-blur-md p-6 md:p-10 rounded-3xl shadow-xl max-w-sm w-full text-center border border-rose-100 relative z-10 my-auto">
        
        <!-- Live Alert Badge -->
        <div id="status-badge" class="inline-block bg-rose-50 border border-rose-100 text-rose-600 text-[11px] font-bold px-4 py-1 rounded-full mb-4 uppercase tracking-wider">
            🚨 Operation: Mood Repair (Stage 1/6)
        </div>

        <!-- Stable Meme Photo Container -->
        <div class="w-full h-52 mx-auto mb-5 rounded-2xl overflow-hidden shadow-md bg-slate-100 flex items-center justify-center border border-rose-50 relative">
            <span class="absolute text-xs text-slate-300 z-0">Loading original meme...</span>
            <!-- Drake Meme Initial Stage -->
            <img id="meme-photo" src="https://i.imgflip.com/43a45p.png" alt="Meme Template" class="w-full h-full object-contain relative z-10">
        </div>

        <!-- Interactive Headings -->
        <h1 id="headline" class="serif-font text-2xl font-bold text-slate-800 mb-2 transition-all duration-300">
            I'm Sorry, Babu... 🥺
        </h1>

        <!-- Funny Medical Prompts -->
        <p id="subtext" class="text-slate-600 mb-6 text-sm leading-relaxed min-h-[64px] flex items-center justify-center px-2">
            I know yesterday you were sad. Your angry face is incredibly cute, but making you feel unheard hurts me the most. Maaf kar do na? Please?
        </p>

        <!-- Dynamic Button Matrix -->
        <div class="flex flex-col gap-3 justify-center items-center w-full">
            <button id="yes-btn" onclick="acceptApology()" class="pulse-btn bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 text-white font-extrabold px-8 py-3 rounded-full shadow-lg shadow-rose-200 transition-all duration-300 w-full text-sm cursor-pointer transform active:scale-95">
                Yes, Forgiven! ❤️
            </button>
            
            <button id="no-btn" onclick="triggerNextMeme()" class="bg-slate-100 active:bg-slate-200 text-slate-500 font-semibold px-6 py-2.5 rounded-full transition-all duration-200 w-full text-xs cursor-pointer">
                No 😤
            </button>
        </div>
    </div>

    <div class="text-slate-400 text-[10px] mt-4 font-medium tracking-wide z-10">
        Prescription ID: #SORRY-DOC-2026
    </div>

    <!-- Scripting Engine for Step-by-Step Meme Photo Buildup -->
    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const headline = document.getElementById('headline');
        const subtext = document.getElementById('subtext');
        const memePhoto = document.getElementById('meme-photo');
        const statusBadge = document.getElementById('status-badge');
        
        let currentStage = 0;
        let yesScale = 1;

        // Scripted Meme Photo Stages Array (Using ultra-reliable global Imgflip CDN vectors)
        const stages = [
            {
                badge: "🚨 Stage 2/6: Heart Rate Rising",
                image: "https://i.imgflip.com/26am.jpg", // One Does Not Simply
                title: "Arey! Sacchi me 'No' click kiya? 😲",
                subtext: "One does not simply say 'No' to an apology as sincere as this! Check your clinical empathy parameters again, Doc!",
                noText: "Still No! 😤"
            },
            {
                badge: "⚠️ Stage 3/6: High BP Alert",
                image: "https://i.imgflip.com/1ur9b0.jpg", // Distracted Boyfriend
                title: "Gusse ko chodo, smile back! 😅",
                subtext: "Why focus on minor fights when you could be checking out your awesome future plans together? Maan jao ab!",
                noText: "Nahi Maanungi! 🙅‍♀️"
            },
            {
                badge: "🔥 Stage 4/6: Critical Condition",
                image: "https://i.imgflip.com/1bgw.jpg", // Grumpy Cat original classic meme
                title: "Itna bhayanak mood off? 💔",
                subtext: "An apology code this perfect doesn't deserve a rejection. Urgent prescription: Click the Pink Button!",
                noText: "Ek aur baar No! 😜"
            },
            {
                badge: "🛑 Stage 5/6: Emergency Ward",
                image: "https://i.imgflip.com/9ehk.jpg", // Disappointed Fan Meme
                title: "Meme badal gaya, aapka mood nahi? 🥺",
                subtext: "Aaditya is close to a total breakdown. Medical ethics don't allow torturing patients like this, Doctor Sahiba!",
                noText: "Last warning No! 💀"
            },
            {
                badge: "🛡️ Stage 6/6: Absolute Lockout",
                image: "https://i.imgflip.com/2fm6x.jpg", // Epic pleading face template
                title: "Please, Ab toh Maan Jao! 🙏❤️",
                subtext: "Okay fine, ab No button click karne par bhi story change nahi hogi. Ab bas upar wala bada pink button hi bacha sakta hai. Please press it! 👇",
                noText: "Clicking this does nothing now! 🛑"
            }
        ];

        function triggerNextMeme() {
            if (currentStage < stages.length) {
                const stage = stages[currentStage];
                
                // Update Layout Elements smoothly
                statusBadge.innerText = stage.badge;
                memePhoto.src = stage.image;
                headline.innerText = stage.title;
                subtext.innerText = stage.subtext;
                noBtn.innerText = stage.noText;

                // Make the Yes button grow progressively larger
                yesScale += 0.18;
                yesBtn.style.transform = `scale(${yesScale})`;
                
                currentStage++;
            } else {
                headline.innerText = "Please, click Yes now! 🥺👉👈";
                subtext.innerText = "Emergency parameters reached. Only the big pink 'Yes' works now!";
            }
        }

        function acceptApology() {
            noBtn.style.display = 'none';
            yesBtn.style.transform = 'scale(1)';
            yesBtn.style.display = 'none';

            statusBadge.innerText = "💚 Status: Successfully Repaired";
            statusBadge.className = "inline-block bg-emerald-50 border border-emerald-100 text-emerald-600 text-[11px] font-bold px-4 py-1 rounded-full mb-4";
            
            // Celebration Success Meme (Success Kid)
            memePhoto.src = "https://i.imgflip.com/2wi2p.jpg"; 
            
            headline.className = "serif-font text-2xl font-bold text-emerald-600 mb-2 transition-all duration-300";
            headline.innerText = "Okay Doctor Sahiba 🩺❤️";
            subtext.innerHTML = "Acche se padho and call me when you get free. I'm proud of you. Love you!";
        }
    </script>
</body>
</html>
