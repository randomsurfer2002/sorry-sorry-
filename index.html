<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Favorite Doctor 🩺❤️</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fff1f2 0%, #fce7f3 50%, #ffe4e6 100%);
            -webkit-touch-callout: none;
            user-select: none;
            overflow: hidden;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        @keyframes dynamic-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .pulse-btn {
            animation: dynamic-bounce 2s infinite;
        }
        
        /* Floating Hearts Animation Background */
        .heart {
            position: absolute;
            bottom: -10%;
            font-size: 20px;
            color: #f43f5e;
            opacity: 0.6;
            animation: floatUp 6s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-110vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative bg-fixed">

    <!-- Container for Floating Hearts Matrix -->
    <div id="hearts-container" class="absolute inset-0 overflow-hidden pointer-events-none"></div>

    <!-- Ambient Medical Elements -->
    <div class="absolute top-6 left-6 text-2xl opacity-40 z-10">🩺</div>
    <div class="absolute bottom-12 right-6 text-3xl opacity-40 z-10">❤️</div>
    <div class="absolute top-1/4 right-8 text-2xl opacity-30 z-10">💊</div>

    <!-- Main Dynamic Card -->
    <div class="bg-white/90 backdrop-blur-md p-6 md:p-10 rounded-3xl shadow-xl max-w-sm w-full text-center border border-rose-100 relative z-20 my-auto">
        
        <!-- Live Alert Badge -->
        <div id="status-badge" class="inline-block bg-rose-50 border border-rose-100 text-rose-600 text-[11px] font-bold px-4 py-1 rounded-full mb-4 uppercase tracking-wider">
            🚨 Mood Status: Senti 
        </div>

        <!-- Stable Emoji Visual Container -->
        <div class="w-full h-40 mx-auto mb-5 rounded-2xl bg-gradient-to-br from-rose-50 to-pink-50 flex items-center justify-center border border-rose-100 shadow-inner">
            <span id="display-emoji" class="text-7xl transition-all duration-300 transform hover:scale-110">🥺👉👈</span>
        </div>

        <!-- Dynamic Title -->
        <h1 id="headline" class="serif-font text-2xl font-bold text-slate-800 mb-2 transition-all duration-300">
            I'm Sorry, Babu... 🥺
        </h1>

        <!-- Dynamic Content Prompt -->
        <p id="subtext" class="text-slate-600 mb-6 text-sm leading-relaxed min-h-[64px] flex items-center justify-center px-2">
            Mujhe pata hai kal tum gussa thi. Waise gusse me tum bohot cute lagti ho, par tumko bura laga dekh kar mujhe bilkul accha nahi lagta. Maaf kar do na please?
        </p>

        <!-- Dynamic Button Matrix -->
        <div class="flex flex-col gap-3 justify-center items-center w-full">
            <button id="yes-btn" onclick="acceptApology()" class="pulse-btn bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 text-white font-extrabold px-8 py-3 rounded-full shadow-lg shadow-rose-200 transition-all duration-300 w-full text-sm cursor-pointer transform active:scale-95">
                Yes, Forgiven! ❤️
            </button>
            
            <button id="no-btn" onclick="triggerNextStage()" class="bg-slate-100 active:bg-slate-200 text-slate-500 font-semibold px-6 py-2.5 rounded-full transition-all duration-200 w-full text-xs cursor-pointer">
                No 😤
            </button>
        </div>
    </div>

    <div class="text-slate-400 text-[10px] mt-4 font-medium tracking-wide z-20">
        Prescription ID: #SORRY-DOC-2026
    </div>

    <!-- Scripting Engine for Custom UI Logic -->
    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const headline = document.getElementById('headline');
        const subtext = document.getElementById('subtext');
        const displayEmoji = document.getElementById('display-emoji');
        const statusBadge = document.getElementById('status-badge');
        const heartsContainer = document.getElementById('hearts-container');
        
        let currentStage = 0;
        let yesScale = 1;

        // Dynamic Emojis Matrix matched with original custom scripts
        const stages = [
            {
                badge: "🚨 Danger Level 1",
                emoji: "😲🕵️‍♂️",
                title: "Arey sacchi me 'No' daba diya? 😂",
                subtext: "Itni aasaani se aam patient ki tarah sorry reject kar dogi kya Doctor Sahiba? Ek aur baar socho!",
                noText: "Nahi maaf karungi! 🙅‍♀️"
            },
            {
                badge: "⚠️ High BP Warning",
                emoji: "🙄😒",
                title: "Hey bhagwan! Phir se 'No'? 🤦‍♂️",
                subtext: "Tumhara focus padhai aur is gusse par hi rahega kya? Thoda idhar bhi dekh lo, itna pyaara page banaya hai!",
                noText: "Pakka nahi! 😤"
            },
            {
                badge: "🔥 Medical License at Risk",
                emoji: "😾🙅‍♀️",
                title: "Error 403: Gussa Out of Bounds!",
                subtext: "Doctor hokar patient par itna atyachar? Medical ethics iski ijazat nahi dete! Jaldi se bada wala pink button daba do.",
                noText: "Ek aur baar try karti hu 😜"
            },
            {
                badge: "🛑 Patient is Crying",
                emoji: "😭💔",
                title: "Meme badal gaye par gussa wahi hai? 🥺",
                subtext: "Mera poora breakdown hone wala hai ab. Itna mat rulao, jaldi se haan bol ke call pe aao na!",
                noText: "Yeh lo aakhri baar No! 💀"
            },
            {
                badge: "🛡️ BHOJPURI MODE ACTIVATED",
                emoji: "😩🤦‍♂️💥",
                title: "Ae bhaiya! Ab ta maan jaa na! 🙏❤️",
                subtext: "Hadd ba ee! Ab 'No' dabawe se kuchu na hoi, poora system eja leak ho gail ba! Ab chupchaap u upar wala bada ka pink buttonwa daba da raaja! 👇",
                noText: "Dabawe ke pari ka? 🛑"
            }
        ];

        function triggerNextStage() {
            if (currentStage < stages.length) {
                const stage = stages[currentStage];
                
                statusBadge.innerText = stage.badge;
                displayEmoji.innerText = stage.emoji;
                headline.innerText = stage.title;
                subtext.innerText = stage.subtext;
                noBtn.innerText = stage.noText;

                yesScale += 0.2;
                yesBtn.style.transform = `scale(${yesScale})`;
                
                currentStage++;
            } else {
                headline.innerText = "Chupchaap 'Yes' daba da ab! 🥺👉👈";
                subtext.innerText = "Ab 'No' buttonwa thak gail ba, khali 'Yes' kaam kari!";
            }
        }

        function acceptApology() {
            noBtn.style.display = 'none';
            yesBtn.style.transform = 'scale(1)';
            yesBtn.style.display = 'none';

            statusBadge.innerText = "💚 Status: All Sorted!";
            statusBadge.className = "inline-block bg-emerald-50 border border-emerald-100 text-emerald-600 text-[11px] font-bold px-4 py-1 rounded-full mb-4";
            
            displayEmoji.innerText = "🥳🎉💖";
            
            headline.className = "serif-font text-2xl font-bold text-emerald-600 mb-2 transition-all duration-300";
            headline.innerText = "Okay Doctor Sahiba 🩺❤️";
            subtext.innerHTML = "Acche se padho and call me when you get free. I'm proud of you. Love you!";
            
            // Intensify hearts upon acceptance
            for (let i = 0; i < 20; i++) {
                setTimeout(createHeart, i * 150);
            }
        }

        // Floating Hearts Generation Loop
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['❤️', '💖', '💝', '💕'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            heartsContainer.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // Continuous slow generation background loop
        setInterval(createHeart, 400);
    </script>
</body>
</html>
